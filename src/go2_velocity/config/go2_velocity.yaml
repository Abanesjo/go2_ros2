go2_velocity_node:
  ros__parameters:
    # Path to the exported ONNX policy (inside the container).
    policy_path: "/workspace/ros2_ws/src/go2_velocity/model/policy.onnx"

    # Seconds to interpolate from the initial pose to the default standing pose
    # before handing control over to the policy.
    standup_duration: 2.0

    # Raw-action multiplier before adding the default joint offset.
    action_scale: 0.25
