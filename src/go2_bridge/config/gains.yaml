go2_bridge_node:
  ros__parameters:
    # false = simulator (skip CRC), true = real hardware (compute CRC).
    real_robot: true

    # Standup gains (uniform, high stiffness for reliable interpolation).
    standup_kp: 60.0
    standup_kd: 5.0

    # Policy gains (per joint type: hip, thigh, calf).
    kp_hip: 20.0
    kp_thigh: 20.0
    kp_calf: 40.0
    kd_hip: 1.0
    kd_thigh: 1.0
    kd_calf: 2.0
